<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Inventory</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <main>
        <div class="add-data">
            <form id="product-form">
                <input type="text" id="product-name" placeholder="Product Name" required>
                <select id="product-category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Groceries">Groceries</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Home & Kitchen">Home & Kitchen</option>
                    <option value="Beauty & Health">Beauty & Health</option>
                </select>
                <input type="number" id="selling-price" placeholder="Selling Price" required>
                <input type="number" id="quantity" placeholder="Quantity in Stock" required>
                <input type="date" id="expiry-date" placeholder="Expiry Date" required>
                <button type="submit" id="submit-btn">Add Product</button>
            </form>
        </div>
        <div class="all-data">

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
